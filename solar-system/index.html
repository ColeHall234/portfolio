<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Solar System</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 20px;
            color: #fff;
            font-family: sans-serif;
            font-size: 13px;
            user-select: none;
        }

        #speedSlider {
            width: 140px;
            accent-color: #ffdd00;
        }

        .label {
            position: absolute;
            color: rgba(255, 255, 255, 0.85);
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none;
            transform: translateX(-50%);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #infoPanel {
            position: absolute;
            top: 50%;
            right: -320px;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(0, 0, 0, 0.75);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            color: #fff;
            font-family: sans-serif;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #infoPanel.visible {
            right: 24px;
        }

        #infoPanel h2 {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .panel-label {
            color: rgba(255, 255, 255, 0.5);
        }

        #panelFact {
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            font-style: italic;
        }

        #closePanel {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
        }

        #closePanel:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <div id="ui">
        <span>Speed</span>
        <input type="range" id="speedSlider" min="0" max="5" step="0.1" value="1" />
        <span id="speedLabel">1x</span>

    </div>
    <div id="infoPanel">
        <button id="closePanel">✕</button>
        <h2 id="panelName"></h2>
        <div class="panel-row"><span class="panel-label">Diameter</span><span id="panelDiameter"></span></div>
        <div class="panel-row"><span class="panel-label">Distance from sun</span><span id="panelDistance"></span></div>
        <div class="panel-row"><span class="panel-label">Orbital period</span><span id="panelYear"></span></div>
        <div class="panel-row"><span class="panel-label">Temperature</span><span id="panelTemp"></span></div>
        <div class="panel-row"><span class="panel-label">Moons</span><span id="panelMoons"></span></div>
        <p id="panelFact"></p>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const speedSlider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');
        let simSpeed = 1;

        speedSlider.addEventListener('input', () => {
            simSpeed = parseFloat(speedSlider.value);
            speedLabel.textContent = simSpeed.toFixed(1) + 'x';
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let focusTarget = null;
        let isFocusing = false;

        const infoPanel = document.getElementById('infoPanel');
        const closePanel = document.getElementById('closePanel');

        function showPanel(planet) {
            const i = planet.data.info;
            document.getElementById('panelName').textContent = planet.data.name;
            document.getElementById('panelDiameter').textContent = i.diameter;
            document.getElementById('panelDistance').textContent = i.distance;
            document.getElementById('panelYear').textContent = i.year;
            document.getElementById('panelTemp').textContent = i.temp;
            document.getElementById('panelMoons').textContent = i.moons;
            document.getElementById('panelFact').textContent = i.fact;
            infoPanel.classList.add('visible');
        }

        function hidePanel() {
            infoPanel.classList.remove('visible');
        }

        closePanel.addEventListener('click', () => {
            hidePanel();
            focusTarget = null;
            isFocusing = false;
        });

        const planetData = [
            {
                name: 'Mercury', radius: 0.8, orbit: 20, speed: 0.047, spin: 0.002, color: 0xb5b5b5, moons: [],
                info: { diameter: '4,879 km', distance: '57.9M km', year: '88 Earth days', temp: '-180 to 430°C', moons: '0', fact: 'Smallest planet. A year is shorter than its day.' }
            },
            {
                name: 'Venus', radius: 1.4, orbit: 30, speed: 0.035, spin: 0.001, color: 0xe8cda0, moons: [],
                info: { diameter: '12,104 km', distance: '108.2M km', year: '225 Earth days', temp: '465°C average', moons: '0', fact: 'Hottest planet despite not being closest to the sun.' }
            },
            {
                name: 'Earth', radius: 1.5, orbit: 42, speed: 0.029, spin: 0.010, color: 0x4488ff,
                moons: [{ name: 'Moon', radius: 0.4, orbit: 4, speed: 0.1, color: 0xaaaaaa }],
                info: { diameter: '12,742 km', distance: '149.6M km', year: '365.25 days', temp: '-88 to 58°C', moons: '1', fact: 'Only known planet to harbor life.' }
            },
            {
                name: 'Mars', radius: 1.1, orbit: 56, speed: 0.024, spin: 0.009, color: 0xc1440e,
                moons: [
                    { name: 'Phobos', radius: 0.2, orbit: 2.5, speed: 0.2, color: 0x998877 },
                    { name: 'Deimos', radius: 0.2, orbit: 4, speed: 0.13, color: 0x887766 }
                ],
                info: { diameter: '6,779 km', distance: '227.9M km', year: '687 Earth days', temp: '-125 to 20°C', moons: '2', fact: 'Home to Olympus Mons, the tallest volcano in the solar system.' }
            },
            {
                name: 'Jupiter', radius: 5.5, orbit: 80, speed: 0.013, spin: 0.020, color: 0xc88b3a,
                moons: [
                    { name: 'Io', radius: 0.5, orbit: 9, speed: 0.09, color: 0xe8c020 },
                    { name: 'Europa', radius: 0.4, orbit: 12, speed: 0.07, color: 0xc8b89a },
                    { name: 'Ganymede', radius: 0.6, orbit: 16, speed: 0.05, color: 0xb0a090 },
                    { name: 'Callisto', radius: 0.5, orbit: 20, speed: 0.03, color: 0x887755 }
                ],
                info: { diameter: '139,820 km', distance: '778.5M km', year: '12 Earth years', temp: '-110°C average', moons: '95', fact: 'The Great Red Spot is a storm that has raged for over 350 years.' }
            },
            {
                name: 'Saturn', radius: 4.5, orbit: 112, speed: 0.009, spin: 0.018, color: 0xe4d191, hasRings: true,
                moons: [
                    { name: 'Titan', radius: 0.6, orbit: 12, speed: 0.04, color: 0xd4a843 },
                    { name: 'Rhea', radius: 0.3, orbit: 17, speed: 0.03, color: 0xbbbbbb }
                ],
                info: { diameter: '116,460 km', distance: '1.43B km', year: '29 Earth years', temp: '-140°C average', moons: '146', fact: 'Its rings are made of ice and rock and stretch 282,000 km wide.' }
            },
            {
                name: 'Uranus', radius: 3.0, orbit: 148, speed: 0.006, spin: 0.012, color: 0x7de8e8,
                moons: [
                    { name: 'Miranda', radius: 0.3, orbit: 6, speed: 0.07, color: 0xbbcccc },
                    { name: 'Ariel', radius: 0.3, orbit: 9, speed: 0.05, color: 0xaabbbb }
                ],
                info: { diameter: '50,724 km', distance: '2.87B km', year: '84 Earth years', temp: '-195°C average', moons: '27', fact: 'Rotates on its side with an axial tilt of 98 degrees.' }
            },
            {
                name: 'Neptune', radius: 2.8, orbit: 185, speed: 0.005, spin: 0.010, color: 0x3f54ba,
                moons: [{ name: 'Triton', radius: 0.4, orbit: 7, speed: 0.06, color: 0xaabbdd }],
                info: { diameter: '49,244 km', distance: '4.5B km', year: '165 Earth years', temp: '-200°C average', moons: '16', fact: 'Winds reach 2,100 km/h — the fastest in the solar system.' }
            },
        ];
        const loader = new THREE.TextureLoader();

        const textureMap = {
            Sun: 'textures/2k_sun.jpg',
            Mercury: 'textures/2k_mercury.jpg',
            Venus: 'textures/2k_venus_surface.jpg',
            Earth: 'textures/2k_earth_daymap.jpg',
            Mars: 'textures/2k_mars.jpg',
            Jupiter: 'textures/2k_jupiter.jpg',
            Saturn: 'textures/2k_saturn.jpg',
            Uranus: 'textures/2k_uranus.jpg',
            Neptune: 'textures/2k_neptune.jpg',
            Moon: 'textures/2k_moon.jpg',
        };
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 80, 220);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const meshes = planetMeshes.map(p => p.mesh);
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                const clicked = planetMeshes.find(p => p.mesh === intersects[0].object);
                if (clicked) {
                    focusTarget = clicked;
                    isFocusing = true;
                    showPanel(clicked);
                }
            } else {
                focusTarget = null;
                isFocusing = false;
                hidePanel();
            }
        });
        const sunGeometry = new THREE.SphereGeometry(8, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ map: loader.load(textureMap.Sun) });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        const pointLight = new THREE.PointLight(0xffffff, 10, 0, 0.5);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const starGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(6000 * 3);
        for (let i = 0; i < 6000 * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 4000;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.7 }));
        scene.add(stars);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const asteroidCount = 3500;
        const asteroidPositions = new Float32Array(asteroidCount * 3);

        for (let i = 0; i < asteroidCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 62 + Math.random() * 14;
            const spread = (Math.random() - 0.5) * 3;

            asteroidPositions[i * 3] = Math.cos(angle) * radius;
            asteroidPositions[i * 3 + 1] = spread;
            asteroidPositions[i * 3 + 2] = Math.sin(angle) * radius;
        }

        const asteroidGeometry = new THREE.BufferGeometry();
        asteroidGeometry.setAttribute('position', new THREE.BufferAttribute(asteroidPositions, 3));

        const asteroidMaterial = new THREE.PointsMaterial({
            color: 0xaaaaaa,
            size: 0.4,
            transparent: true,
            opacity: 0.7,
        });

        const asteroidBelt = new THREE.Points(asteroidGeometry, asteroidMaterial);
        scene.add(asteroidBelt);

        const planetMeshes = [];

        const labelContainer = document.createElement('div');
        document.body.appendChild(labelContainer);

        planetData.forEach(data => {

            const orbitRing = new THREE.RingGeometry(data.orbit, data.orbit + 0.15, 128);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, opacity: 0.15, transparent: true });
            const orbitMesh = new THREE.Mesh(orbitRing, orbitMat);
            orbitMesh.rotation.x = Math.PI / 2;
            scene.add(orbitMesh);

            const pivot = new THREE.Object3D();
            pivot.rotation.y = Math.random() * Math.PI * 2;
            scene.add(pivot);

            const geo = new THREE.SphereGeometry(data.radius, 32, 32);
            const tex = textureMap[data.name] ? loader.load(textureMap[data.name]) : null;
            const mat = new THREE.MeshStandardMaterial({ map: tex || null, color: tex ? 0xffffff : data.color });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.x = data.orbit;
            pivot.add(mesh);

            if (data.hasRings) {
                const ringGeo = new THREE.RingGeometry(data.radius + 1.5, data.radius + 4.5, 64);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0xc2a873, side: THREE.DoubleSide, opacity: 0.8, transparent: true });
                const ringMesh = new THREE.Mesh(ringGeo, ringMat);
                ringMesh.rotation.x = Math.PI / 3;
                mesh.add(ringMesh);
            }

            const moonMeshes = [];
            data.moons.forEach(moonData => {
                const moonPivot = new THREE.Object3D();
                moonPivot.rotation.y = Math.random() * Math.PI * 2;
                mesh.add(moonPivot);

                const moonGeo = new THREE.SphereGeometry(moonData.radius, 16, 16);
                const moonTex = textureMap[moonData.name] ? loader.load(textureMap[moonData.name]) : null;
                const moonMat = new THREE.MeshStandardMaterial({ map: moonTex || null, color: moonTex ? 0xffffff : moonData.color });
                const moonMesh = new THREE.Mesh(moonGeo, moonMat);
                moonMesh.position.x = moonData.orbit;
                moonPivot.add(moonMesh);

                moonMeshes.push({ mesh: moonMesh, pivot: moonPivot, data: moonData });
            });

            planetMeshes.push({ mesh, pivot, data, moonMeshes });

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = data.name;
            labelContainer.appendChild(label);
            planetMeshes[planetMeshes.length - 1].label = label;
        });

        function animate() {
            requestAnimationFrame(animate);

            sun.rotation.y += 0.001 * simSpeed;
            camera.updateMatrixWorld();

            planetMeshes.forEach(({ mesh, pivot, data, moonMeshes, label }) => {
                pivot.rotation.y += data.speed * simSpeed;
                mesh.rotation.y += data.spin * simSpeed;

                moonMeshes.forEach(({ pivot: moonPivot, data: moonData }) => {
                    moonPivot.rotation.y += moonData.speed * simSpeed;
                });

                const worldPos = new THREE.Vector3();
                mesh.getWorldPosition(worldPos);
                worldPos.y += data.radius;

                const projected = worldPos.project(camera);
                const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

                if (projected.z < 1) {
                    label.style.display = 'block';
                    label.style.left = x + 'px';
                    label.style.top = y + 'px';
                } else {
                    label.style.display = 'none';
                }
            });
            if (isFocusing && focusTarget) {
                const targetPos = new THREE.Vector3();
                focusTarget.mesh.getWorldPosition(targetPos);

                const offset = new THREE.Vector3(0, focusTarget.data.radius * 3, focusTarget.data.radius * 8);
                const desiredPos = targetPos.clone().add(offset);

                camera.position.lerp(desiredPos, 0.05);
                controls.target.lerp(targetPos, 0.05);
            }
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>

</html>
