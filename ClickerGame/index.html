<!DOCTYPE html>
<html>

<head>
    <title>Clicker Game</title>
    <script>
        let souls = 0;
        let souls_per_second = 0;
        let tick = 0;
        let souls_per_click = 1;
        let total_souls = 0;
        let audio_ctx = null;
        let dark_essence = 0;
        let soul_multiplier = 1;
        const PRESTIGE_COST = 100000;

        let lore_entries = [
            { threshold: 0, title: "Day One", text: "I have begun the ritual. The grimoire speaks of a harvest — souls drawn from the void between worlds. Tonight I claimed my first.", unlocked: true },
            { threshold: 50, title: "The Hunger", text: "There is a warmth to it now. Each soul collected feels less like theft and more like... reunion. I do not sleep.", unlocked: false },
            { threshold: 200, title: "First Servant", text: "I sent a digger into the old cemetery at the edge of the village. He does not speak anymore. He does not need to.", unlocked: false },
            { threshold: 750, title: "The Veil Thins", text: "I can see them now without closing my eyes. They drift through the walls of my study, curious. Some are afraid. Good.", unlocked: false },
            { threshold: 2000, title: "A Pact Sealed", text: "It had a name once. I did not ask it. Names give power and I will not surrender that here. It serves. That is enough.", unlocked: false },
            { threshold: 8000, title: "What I Was", text: "I found a portrait of myself from before. I do not recognize the face. It looks... soft. Naive. I burned it.", unlocked: false },
            { threshold: 25000, title: "They Whisper Back", text: "The souls speak now. Not in words — in certainty. They know what I am becoming. They do not resist.", unlocked: false },
            { threshold: 100000, title: "Inevitable", text: "There is no word for what I am. The old texts come closest with 'Devourer' but even that feels insufficient. I have stopped counting. The harvest continues.", unlocked: false }
        ];

        function calculate_multiplier() {
            soul_multiplier = 1 + (dark_essence * 0.1);
        }

        function check_lore() {
            let newly_unlocked = false;
            lore_entries.forEach(function (entry) {
                if (!entry.unlocked && total_souls >= entry.threshold) {
                    entry.unlocked = true;
                    newly_unlocked = true;
                }
            });
            if (newly_unlocked) {
                render_lore();
            }
        }

        function render_lore() {
            let log = document.getElementById("lore-log");
            log.innerHTML = "";
            let unlocked = lore_entries.filter(function (entry) {
                return entry.unlocked;
            });
            unlocked.reverse().forEach(function (entry) {
                let div = document.createElement("div");
                div.className = "lore-entry";
                div.innerHTML = "<span class='lore-title'>" + entry.title + "</span><p class='lore-text'>" + entry.text + "</p>";
                log.appendChild(div);
            });
        }

        function get_audio() {
            if (!audio_ctx) {
                audio_ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audio_ctx;
        }

        function play_sound(frequency, duration, type, volume) {
            let ctx = get_audio();
            let oscillator = ctx.createOscillator();
            let gain = ctx.createGain();

            oscillator.connect(gain);
            gain.connect(ctx.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = type;
            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + duration);
        }

        function sound_harvest() {
            play_sound(220, 0.1, "sine", 0.3);
        }

        function sound_purchase() {
            play_sound(440, 0.15, "sine", 0.4)
            setTimeout(function () {
                play_sound(550, 0.2, "sine", 0.3);
            }, 100);
        }

        function sound_achievement() {
            play_sound(523, 0.1, "sine", 0.4);
            setTimeout(function () {
                play_sound(659, 0.1, "sine", 0.4)
            }, 120);
            setTimeout(function () {
                play_sound(784, 0.3, "sine", 0.4)
            }, 240);
        }

        let milestones = [
            { threshold: 100, message: "The dead stir. Your power awakens.", claimed: false },
            { threshold: 500, message: "Spirits bow before you, dark one.", claimed: false },
            { threshold: 1000, message: "A thousand souls. The veil grows thin.", claimed: false },
            { threshold: 5000, message: "Demons whisper your name in the abyss.", claimed: false },
            { threshold: 10000, message: "You are no longer mortal. You are inevitable.", claimed: false }
        ];

        let achievements = [
            { id: "first_blood", title: "First Blood", desc: "Harvest your first soul", icon: "🩸", earned: false, check: function () { return souls >= 1; } },
            { id: "grave_robber", title: "Grave Robber", desc: "Own 10 Gravediggers", icon: "💀", earned: false, check: function () { return gravedigger.count >= 10; } },
            { id: "spirit_army", title: "Spirit Army", desc: "Own 5 Wraiths", icon: "👁️", earned: false, check: function () { return wraith.count >= 5; } },
            { id: "damned", title: "Damned", desc: "Complete your first Demon Pact", icon: "😈", earned: false, check: function () { return demon.count >= 1; } },
            { id: "unstoppable", title: "Unstoppable", desc: "Reach 50 souls per click", icon: "⚡", earned: false, check: function () { return souls_per_click >= 50; } },
            { id: "soul_lord", title: "Soul Lord", desc: "Accumulate 100,000 souls", icon: "🌑", earned: false, check: function () { return total_souls >= 100000; } }
        ];

        let gravedigger = {
            count: 0,
            cost: 15,
            base_cost: 15,
            sps: 1
        }

        let wraith = {
            count: 0,
            cost: 100,
            base_cost: 100,
            sps: 5
        }

        let demon = {
            count: 0,
            cost: 1000,
            base_cost: 1000,
            sps: 25

        }

        let blood_ritual = {
            count: 0,
            cost: 50,
            base_cost: 50,
            spc: 2
        }

        let soul_surge = {
            count: 0,
            cost: 500,
            base_cost: 500,
            spc: 10
        }

        function format_number(n) {
            if (n >= 1000000000) return (n / 1000000000).toFixed(1) + "B";
            if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
            if (n >= 1000) return (n / 1000).toFixed(1) + "k";
            return Math.floor(n).toString();
        }

        function check_milestones() {
            milestones.forEach(function (milestone) {
                if (souls >= milestone.threshold && !milestone.claimed) {
                    milestone.claimed = true;
                    show_message(milestone.message);
                }
            })
        }

        function harvest_soul() {
            souls += souls_per_click * soul_multiplier;
            total_souls += souls_per_click * soul_multiplier;
            sound_harvest();
            check_lore();
            check_milestones();
            check_achievements();
            update_display();
        }

        function check_achievements() {
            achievements.forEach(function (achievement) {
                if (!achievement.earned && achievement.check()) {
                    achievement.earned = true;
                    show_achievement(achievement);
                }
            })
        }

        function show_achievement(achievement) {
            let popup = document.getElementById("achievement-popup");
            sound_achievement();
            popup.innerHTML = achievement.icon + " <strong>" + achievement.title + "</strong> - " + achievement.desc;
            popup.style.opacity = "1";
            popup.style.transform = "translateY(0)";
            setTimeout(function () {
                popup.style.opacity = "0";
                popup.style.transform = "translateY(-20px)";
            }, 3000);
            update_achievement_display();
        }

        function update_achievement_display() {
            let grid = document.getElementById("achievement-grid");
            grid.innerHTML = "";
            achievements.forEach(function (achievement) {
                let item = document.createElement("div");
                item.className = achievement.earned ? "achievement earned" : "achievement locked";
                item.innerHTML = "<span class='ach-icon'>" + achievement.icon + "</span><span class='ach-title'>" + achievement.title + "</span>";
                item.title = achievement.desc;
                grid.appendChild(item);
            });
        }

        function buy_click_upgrade(upgrade, name) {
            if (souls >= upgrade.cost) {
                sound_purchase();
                souls -= upgrade.cost;
                upgrade.count += 1;
                souls_per_click += upgrade.spc;
                upgrade.cost = Math.ceil(upgrade.base_cost * Math.pow(1.6, upgrade.count));
                document.getElementById(name + "-cost").innerText = format_number(upgrade.cost);
                document.getElementById(name + "-count").innerText = upgrade.count;
                check_achievements();
                update_display();
            }
        }

        function buy_upgrade(upgrade, name) {
            if (souls >= upgrade.cost) {
                sound_purchase();
                souls -= upgrade.cost;
                upgrade.count += 1;
                souls_per_second += upgrade.sps;
                upgrade.cost = Math.ceil(upgrade.base_cost * Math.pow(1.5, upgrade.count));
                document.getElementById(name + "-cost").innerText = format_number(upgrade.cost);
                document.getElementById(name + "-count").innerText = upgrade.count;
                check_achievements();
                update_display();
            }
        }

        function prestige() {
            if (total_souls < PRESTIGE_COST) return;

            let earned = Math.floor(total_souls / PRESTIGE_COST);
            dark_essence += earned;
            calculate_multiplier();

            souls = 0;
            total_souls = 0;
            souls_per_second = 0;
            souls_per_click = 1;

            gravedigger = { count: 0, cost: 15, base_cost: 15, sps: 1 };
            wraith = { count: 0, cost: 100, base_cost: 100, sps: 5 };
            demon = { count: 0, cost: 1000, base_cost: 1000, sps: 25 };
            blood_ritual = { count: 0, cost: 50, base_cost: 50, spc: 2 };
            soul_surge = { count: 0, cost: 500, base_cost: 500, spc: 10 };

            milestones.forEach(function (m) { m.claimed = false; });
            lore_entries.forEach(function (e) { e.unlocked = e.threshold === 0; });

            document.getElementById("gravedigger-cost").innerText = format_number(gravedigger.cost);
            document.getElementById("gravedigger-count").innerText = 0;
            document.getElementById("wraith-cost").innerText = format_number(wraith.cost);
            document.getElementById("wraith-count").innerText = 0;
            document.getElementById("demon-cost").innerText = format_number(demon.cost);
            document.getElementById("demon-count").innerText = 0;
            document.getElementById("blood_ritual-cost").innerText = format_number(blood_ritual.cost);
            document.getElementById("blood_ritual-count").innerText = 0;
            document.getElementById("soul_surge-cost").innerText = format_number(soul_surge.cost);
            document.getElementById("soul_surge-count").innerText = 0;

            save_game();
            update_display();
            render_lore();
            show_prestige_message(earned);
        }

        function show_prestige_message(earned) {
            let msg = document.getElementById("milestone-msg");
            msg.innerText = "✦ Ascension complete. +" + earned + " Dark Essence. The cycle begins anew.";
            msg.style.opacity = "1";
            setTimeout(function () {
                msg.style.opacity = "0";
            }, 6000);
        }



        function show_offline_message(earned, seconds) {
            let minutes = Math.floor(seconds / 60);
            let time_str = minutes < 60 ? minutes + " minutes" : Math.floor(minutes / 60) + " hours";
            let msg = document.getElementById("milestone-msg");
            msg.innerText = "Welconme back. " + time_str + " passed. +" + format_number(earned) + " souls collected.";
            msg.style.opacity = "1";
            setTimeout(function () {
                msg.style.opacity = "0";
            }, 6000);
        }

        function update_display() {
            document.getElementById("score").innerText = "Souls: " + format_number(souls);
            document.getElementById("sps-display").innerText = "Souls per second: " + format_number(souls_per_second) + " | Per click: " + format_number(souls_per_click);
            document.getElementById("essence-display").innerText = "Dark Essence: " + dark_essence + " | Multiplier: x" + soul_multiplier.toFixed(1);
            let btn = document.getElementById("prestige-btn");
            if (total_souls >= PRESTIGE_COST) {
                btn.style.display = "block";

            } else {
                btn.style.display = "none";
            }
        }

        function show_message(text) {
            let msg = document.getElementById("milestone-msg");
            msg.innerText = text;
            msg.style.opacity = "1";
            setTimeout(function () {
                msg.style.opacity = "0";
            }, 4000);
        }

        setInterval(function () {
            souls += souls_per_second * soul_multiplier;
            total_souls += souls_per_second * soul_multiplier;
            update_display();
            check_lore();
            check_achievements();
            check_milestones();
            tick += 1;
            if (tick % 10 === 0) {
                save_game();
            }
        }, 1000);

        function save_game() {
            let save_data = {
                last_saved: Date.now(),
                souls: souls,
                souls_per_second: souls_per_second,
                gravedigger: gravedigger,
                wraith: wraith,
                demon: demon,
                blood_ritual: blood_ritual,
                soul_surge: soul_surge,
                souls_per_click: souls_per_click,
                total_souls: total_souls,
                dark_essence: dark_essence,
                soul_multiplier: soul_multiplier
            }
            localStorage.setItem("soul_harvest_save", JSON.stringify(save_data));
        }

        function load_game() {
            let saved = localStorage.getItem("soul_harvest_save");
            if (saved) {
                let data = JSON.parse(saved);
                souls = data.souls;
                souls_per_second = data.souls_per_second;
                gravedigger = data.gravedigger;
                wraith = data.wraith;
                demon = data.demon;
                souls_per_click = data.souls_per_click || 1;
                total_souls = data.total_souls || 0;
                blood_ritual = data.blood_ritual;
                soul_surge = data.soul_surge;
                dark_essence = data.dark_essence || 0;
                soul_multiplier = data.soul_multiplier || 1;
                document.getElementById("essence-display").innerText = "Dark Essence: " + dark_essence + " | Multiplier: x" + soul_multiplier.toFixed(1);
                document.getElementById("gravedigger-cost").innerText = format_number(gravedigger.cost);
                document.getElementById("gravedigger-count").innerText = format_number(gravedigger.count);
                document.getElementById("wraith-cost").innerText = format_number(wraith.cost);
                document.getElementById("wraith-count").innerText = format_number(wraith.count);
                document.getElementById("demon-cost").innerText = format_number(demon.cost);
                document.getElementById("demon-count").innerText = format_number(demon.count);
                document.getElementById("blood_ritual-cost").innerText = format_number(blood_ritual.cost);
                document.getElementById("blood_ritual-count").innerText = format_number(blood_ritual.count);
                document.getElementById("soul_surge-cost").innerText = format_number(soul_surge.cost);
                document.getElementById("soul_surge-count").innerText = format_number(soul_surge.count);

                if (data.last_saved) {
                    let now = Date.now();
                    let elapsed_seconds = Math.floor((now - data.last_saved) / 1000);
                    let offline_cap = 60 * 60 * 4;
                    let capped_seconds = Math.min(elapsed_seconds, offline_cap);
                    if (capped_seconds > 0 && souls_per_second > 0) {
                        let earned = capped_seconds * souls_per_second;
                        souls += earned;
                        total_souls += earned;
                        show_offline_message(earned, capped_seconds);
                    }
                };

                update_display();
                update_achievement_display();
                check_lore();
            }
        }

        window.onload = function () {
            load_game();
            update_achievement_display();
            render_lore();
        }

    </script>

        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&display=swap"
        rel="stylesheet">

            box-shadow: 0 0 25px #9b4dca55;
