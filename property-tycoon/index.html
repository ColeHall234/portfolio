<!DOCTYPE html>
<html lan="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Tycoon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --accent: #16a34a;
            --accent-light: #dcfce7;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--accent);
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 13px;
            opacity: 0.8;
        }

        .stats-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex;
            gap: 40px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent);
        }

        .game-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
            padding: 24px 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
            width: 100%;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #15803d;
        }

        .btn-primary:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-warning {
            background: var(--warning);
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-warning:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .property-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .property-card:last-child {
            margin-bottom: 0;
        }

        .property-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .property-emoji {
            font-size: 32px;
        }

        .property-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .property-detail {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }


    </style>
</head>

<body>

    <header>
        <div class="logo">🏠 Property Tycoon</div>
        <div class="tagline">Start with nothing. Build an empire.</div>
    </header>
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-label">Cash</span>
            <span class="stat-value" id="money-display">$500</span>
        </div>
        <div class="stat">
            <span class="stat-label">Per Second</span>
            <span class="stat-value" id="income-display">$0/sec</span>
        </div>
        <div class="stat">
            <span class="stat-label">Total Earned</span>
            <span class="stat-value" id="total-display">$0</span>
        </div>
    </div>
    <div class="game-layout">

        <!-- Left Column -->
        <div>
            <div class="panel">
                <div class="panel-title">💼 Handyman Work</div>
                <button id="click-btn" class="btn btn-primary">Do a Job</button>
            </div>

            <div class="panel">
                <div class="panel-title">👷 Workers</div>
                <button id="helper-btn" class="btn btn-primary">Hire Helper - $50</button>
            </div>
        </div>

        <!-- Right Column -->
        <div>
            <div class="panel">
                <div class="panel-title">🏘️ Properties</div>
                <div id="property-list"></div>
            </div>
        </div>

    </div>

    <script>
        let money = 500;
        let moneyPerClick = 5;
        let passiveIncome = 0;
        let totalEarned = 0;
        let helpers = 0;
        let helperCost = 50;

        const properties = [
            {
                id: 0,
                name: 'Rundown Shack',
                emoji: '🏚️',
                cost: 200,
                renovationCost: 100,
                renovated: false,
                owned: false,
                rentPerSec: 2,
                sellValue: 500
            },

            {
                id: 1,
                name: 'Old Duplex',
                emoji: '🏠',
                cost: 800,
                renovationCost: 300,
                renovated: false,
                owned: false,
                rentPerSec: 6,
                sellValue: 1800
            },

            {
                id: 2,
                name: 'Small Apartment',
                emoji: '🏢',
                cost: 2500,
                renovationCost: 800,
                renovated: false,
                owned: false,
                rentPerSec: 15,
                sellValue: 5500
            }
        ]

        const moneyDisplay = document.getElementById('money-display');
        const clickBtn = document.getElementById('click-btn');

        clickBtn.addEventListener('click', function () {
            money += moneyPerClick;
            totalEarned += moneyPerClick;
            moneyDisplay.textContent = '$' + money.toLocaleString();
            updateHelperBtn();
        });

        const helperBtn = document.getElementById('helper-btn');

        helperBtn.addEventListener('click', function () {
            if (money >= helperCost) {
                money -= helperCost;
                helpers += 1;
                passiveIncome += 1;
                helperCost = Math.round(helperCost * 1.25);
                moneyDisplay.textContent = '$' + money.toLocaleString();
                updateHelperBtn();
            }
        });

        function updateHelperBtn() {
            helperBtn.textContent = 'Hire Helper - $' + helperCost.toLocaleString();
            helperBtn.disabled = money < helperCost;
            document.getElementById('income-display').textContent = '$' + passiveIncome + '/sec';
        }

        setInterval(function () {
            if (passiveIncome > 0) {
                money += passiveIncome;
                totalEarned += passiveIncome;
                moneyDisplay.textContent = '$' + money.toLocaleString();
                updateHelperBtn();
                renderProperties();
            }
        }, 1000);

        function renderProperties() {
            const list = document.getElementById('property-list');
            list.innerHTML = '';

            properties.forEach(function (p) {
                const div = document.createElement('div');
                div.className = 'property-card';
                if (!p.owned) {
                    div.innerHTML = `
                    <div class="property-info">
        <span class="property-emoji">${p.emoji}</span>
        <div>
            <div class="property-name">${p.name}</div>
            <div class="property-detail">$${p.cost.toLocaleString()}</div>
        </div> 
        </div>
        <button class="btn btn-primary" onclick="buyProperty(${p.id})" ${money < p.cost ? 'disabled' : ''}>
          Buy
        </button>
      `;
                } else if (!p.renovated) {
                    div.innerHTML = `
                    <div class="property-info">
                    <span class="property-emoji">${p.emoji}</span>
                    <div>
                        <div class="property-name">${p.name}</div>
                        <div class="property-detail">Needs renovation ($${p.renovationCost.toLocaleString()})</div>
                        </div>
                    </div>
        <button class="btn btn-warning" onclick="renovateProperty(${p.id})" ${money < p.renovationCost ? 'disabled' : ''}>
          Renovate
        </button>
      `;
                } else {
                    div.innerHTML = `
                    <div class="property-info">
                    <span class="property-emoji">${p.emoji}</span>
                    <div>
                        <div class="property-name">${p.name}</div>
                        <div class="property-detail">Earning $${p.rentPerSec}/sec</div>
                        </div>
                    </div>
        <button class="btn btn-danger" onclick="sellProperty(${p.id})">
          Sell for $${p.sellValue.toLocaleString()}
        </button>
      `;
                }

                list.appendChild(div);
            });
        }

        function buyProperty(id) {
            const p = properties[id];
            if (money >= p.cost) {
                money -= p.cost;
                p.owned = true;
                renderProperties();
                updateHelperBtn();
            }
        }

        function renovateProperty(id) {
            const p = properties[id];
            if (money >= p.renovationCost) {
                money -= p.renovationCost;
                p.renovated = true;
                passiveIncome += p.rentPerSec;
                renderProperties();
                updateHelperBtn();
            }
        }

        function sellProperty(id) {
            const p = properties[id];
            money += p.sellValue;
            totalEarned += p.sellValue;
            passiveIncome -= p.rentPerSec;
            p.owned = false;
            p.renovated = false;
            renderProperties();
            updateHelperBtn();
        }
    </script>
</body>

</html>
