<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ShiftCraft - Sign In</title>
        <link rel="stylesheet" href="css/style.css">
        <style>
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, #eff6ff, #f8fafc);
            }

            .auth-container {
                width: 100%;
                max-width: 400px;
                padding: 20px;
            }

            .auth-logo {
                text-align: center;
                margin-bottom: 32px;
            }

            .auth-logo h1 {
                font-size: 28px;
                font-weight: 800;
                color: var(--accent);
                letter-spacing: -1px;
            }

            .auth-logo p {
                color: var(--text-muted);
                margin-top: 4px;
                font-size: 14px;
            }

            .auth-card {
                background: white;
                border-radius: 12px;
                padding: 32px;
                box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            }

            .auth-tabs {
                display: flex;
                margin-bottom: 24px;
                border-bottom: 1px solid var(--border);
            }

            .auth-tab {
                flex: 1;
                padding: 10px;
                text-align: center;
                font-weight: 500;
                color: var(--text-muted);
                cursor: pointer;
                border-bottom: 2px solid transparent;
                margin-bottom: -1px;
                transition: all 0.15s ease;
                background: none;
                border-left: none;
                border-right: none;
                border-top: none;
                font-size: 14px;
            }

            .auth-tab.active {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }

            .auth-footer {
                text-align: center;
                margin-top: 16px;
                font-size: 13px;
                color: var(--text-muted);
            }
        </style>
    </head>
    <body>

        <div class="auth-container">
            <div class="auth-logo">
                <h1>ShiftCraft</h1>
                <p>Simple scheduling for small teams</p>
            </div>

            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="show_tab('login')">Sign In</button>
                    <button class="auth-tab" onclick="show_tab('register')">Create Account</button>
                </div>

                <div id="alert-box"></div>

                <!-- Login Form -->
                 <div id="login-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="you@business.com" />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" />
                    </div>
                    <button class="btn btn-primary btn-full" onclick="login()">Sign In</button>
                 </div>

                 <!-- Register Form -->
                  <div id="register-form" class="hidden">
                    <div class="form-group">
                        <label>Business Name</label>
                        <input type="text" id="reg-business" placeholder="Your Business Name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" placeholder="you@business.com" />
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" placeholder="••••••••" />
                    </div>
                    <button class="btn btn-primary btn-full" onclick="register()">Create Account</button>
                    <p class="text-muted text-center mt-16" style="font-size:12px">
                        Freen plan inclueds up to 5 employees.
                    </p>
                  </div>
            </div>

            <div class="auth-footer">
                <a href="index.html">← Back to home</a>
            </div>
        </div>

        <script src="js/auth.js"></script>
    </body>
</html>
