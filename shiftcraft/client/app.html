<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftCraft</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            overflow: hiddden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: white;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .app-nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-logo {
            font-size: 16px;
            font-weight: 800;
            color: var(--accent);
        }

        .business-name {
            font-size: 13px;
            color: var(--text-muted)
        }

        .app-nav-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* - Sidebar - */
        .sidebar {
            width: 220px;
            background: var(--bg-sidebar);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid #334155;
        }

        .sidebar-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 8px
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar-nav-item:hover {
            background: #334155;
            color: white;
        }

        .sidebar-nav-item.active {
            background: var(--accent);
            color: white;
        }

        /* - Main Content - */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        /* - Schedule - */
        .week-nav {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .week-nav h2 {
            font-size: 15px;
            font-weight: 600;
            min-width: 200;
            text-align: center;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 120px repeat(7, 1fr);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: white;
        }

        .schedule-header {
            background: #f8fafc;
            padding: 10px 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .schedule-employee {
            padding: 12px 8px;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            background: #f8fafc;
            display: flex;
            align-items: center;
        }

        .schedule-cell {
            padding: 4px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            min-height: 60px;
            cursor: pointer;
            transition: background 0.1s ease;
        }

        .schedule-cell:hover {
            background: var(--accent-light);
        }

        .shift-block {
            background: var(--accent);
            color: white;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 11px;
            margin-bottom: 2px;
            cursor: pointer;
            position: relative;
        }

        .shift-block:hover {
            background: var(--accent-hover);
        }

        .shift-delete {
            position: absolute;
            right: 4px;
            top: 2px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.7;
            line-height: 1;
        }

        .shift-delete:hover {
            opacity: 1;
        }

        /* - Employees - */
        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .employee-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .employee-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .employee-info {
            flex: 1;
            min-width: 0;
        }

        .employee-name {
            font-weight: 600;
            font-size: 14px;
        }

        .employee-role {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .employee-actions {
            display: flex;
            gap: 6px;
        }

        /* - Empty States - */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--text)
        }

        .empty-state p {
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- Nav -->
    <nav class="app-nav">
        <div class="app-nav-lef">
            <span class="app-logo">ShiftCraft</span>
            <span class="business-name" id="nav-business"></span>
        </div>
        <div class="app-nav-right">
            <span class="text-muted" id="nav-email" style="font-size:13px"></span>
            <button class="btn btn-secondary btn-sm" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div class="app-body">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Menu</div>
                <button class="sidebar-nav-item active" onclick="show_page('schedule')">
                    📅 Schedule
                </button>
                <button class="sidebar-nav-item" onclick="show_page('employees')">
                    👥 Employees
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">

            <!-- Schedule Page -->
            <div id="page-schedule" class="page active">
                <div class="page-header">
                    <h1>Weekly Schedule</h1>
                    <button class="btn btn-primary" onclick="open_add_shift()">+ Add Shift</button>
                </div>
                <div class="week-nav">
                    <button class="btn btn-secondary btn-sm" onclick="change_week(-1)">← Prev</button>
                    <h2 id="week-label"></h2>
                    <button class="btn btn-secondary btn-sm" onclick="change_week(1)">Next →</button>
                </div>
                <div class="schedule-grid" id="schedule-grid"></div>
            </div>

            <!-- Employees Page -->
            <div id="page-employees" class="page">
                <div class="page-header">
                    <h1>Employees</h1>
                    <button class="btn btn-primary" onclick="open_add_employee()">+ Add Employee</button>
                </div>
                <div class="employee-grid" id="employee-grid"></div>
            </div>
        </main>

        </main>
    </div>

    <!-- Add Shift Modal -->
    <div id="shift-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Shift</h2>
                <button class="modal-close" onclick="close_modal('shift-modal')">×</button>
            </div>
            <div class="form-group">
                <label>Employee</label>
                <select id="shift-employee"></select>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="shift-date" />
            </div>
            <div class="form-group">
                <label>Start Time</label>
                <input type="time" id="shift-start" />
            </div>
            <div class="form-group">
                <label>End Time</label>
                <input type="time" id="shift-end" />
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <input type="text" id="shift-notes" placeholder="e.g. Opening Shift" />
            </div>
            <div id="shift-alert"></div>
            <button class="btn btn-primary btn-full" onclick="save_shift()">Save Shift</button>
        </div>
    </div>

    <!-- Add Employee Modal -->
    <div id="employee-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2>Add Employee</h2>
                <button class="modal-close" onclick="close_modal('employee-modal')">×</button>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="emp-name" placeholder="Full name" />
            </div>
            <div class="form-group">
                <label>Email (optional)</label>
                <input type="email" id="emp-email" placeholder="employee@email.com" />
            </div>
            <div class="form-group">
                <label>Role (optional)</label>
                <input type="text" id="emp-role" placeholder="e.g. Manager, Cashier" />
            </div>
            <div id="emp-alert"></div>
            <button class="btn btn-primary btn-full" onclick="save_employee()">Add Employee</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
